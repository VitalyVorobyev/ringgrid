name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-quality:
    name: Rust Quality (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Maintainability guardrails (static)
        run: python3 tools/ci/maintainability_guardrails.py --check static

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace --all-features

  synth-smoke:
    name: Synthetic Smoke Eval (ubuntu)
    runs-on: ubuntu-latest
    needs: rust-quality
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip numpy matplotlib

      - name: Build CLI
        run: cargo build --workspace --all-features

      - name: Run end-to-end synthetic smoke eval
        run: python tools/run_synth_eval.py --n 1 --blur_px 1.0 --marker_diameter 32.0 --out_dir tools/out/ci_smoke

  python-binding:
    name: Python Binding (ubuntu)
    runs-on: ubuntu-latest
    needs: rust-quality
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Create venv and install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip maturin pytest numpy matplotlib

      - name: Check generated typing artifacts
        run: .venv/bin/python crates/ringgrid-py/tools/generate_typing_artifacts.py --check

      - name: Build/install Python package
        run: .venv/bin/python -m maturin develop -m crates/ringgrid-py/Cargo.toml --release

      - name: Run Python tests
        run: .venv/bin/python -m pytest crates/ringgrid-py/tests -q

  check-docs:
    name: Documentation (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Maintainability guardrails (rustdoc coverage)
        run: python3 tools/ci/maintainability_guardrails.py --check rustdoc

      - name: Install mdbook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook

      - name: Build book
        run: mdbook build book

      - name: Build rustdoc
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --all-features --no-deps

      - name: Test doctests
        run: cargo test --doc --workspace

  wasm-build:
    name: WASM Build (ubuntu)
    runs-on: ubuntu-latest
    needs: rust-quality
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM package
        run: wasm-pack build crates/ringgrid-wasm --target web --release

      - name: Verify package output
        run: |
          test -f crates/ringgrid-wasm/pkg/ringgrid_wasm_bg.wasm
          test -f crates/ringgrid-wasm/pkg/ringgrid_wasm.js
          test -f crates/ringgrid-wasm/pkg/ringgrid_wasm.d.ts
          ls -lh crates/ringgrid-wasm/pkg/ringgrid_wasm_bg.wasm

  cross-build:
    name: Cross-platform Build/Test
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace --all-features

      - name: Test
        run: cargo test --workspace --all-features
