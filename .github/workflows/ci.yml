name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-quality:
    name: Rust Quality (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Maintainability guardrails (static)
        run: python3 tools/ci/maintainability_guardrails.py --check static

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace --all-features

  synth-smoke:
    name: Synthetic Smoke Eval (ubuntu)
    runs-on: ubuntu-latest
    needs: rust-quality
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip numpy matplotlib

      - name: Build CLI
        run: cargo build --workspace --all-features

      - name: Run end-to-end synthetic smoke eval
        run: python tools/run_synth_eval.py --n 1 --blur_px 1.0 --marker_diameter 32.0 --out_dir tools/out/ci_smoke

  python-binding:
    name: Python Binding (ubuntu)
    runs-on: ubuntu-latest
    needs: rust-quality
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Create venv and install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip maturin pytest numpy matplotlib

      - name: Check generated typing artifacts
        run: .venv/bin/python crates/ringgrid-py/tools/generate_typing_artifacts.py --check

      - name: Build/install Python package
        run: .venv/bin/python -m maturin develop -m crates/ringgrid-py/Cargo.toml --release

      - name: Run Python tests
        run: .venv/bin/python -m pytest crates/ringgrid-py/tests -q

  check-docs:
    name: Documentation (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Maintainability guardrails (rustdoc coverage)
        run: python3 tools/ci/maintainability_guardrails.py --check rustdoc

      - name: Install mdbook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook

      - name: Build book
        run: mdbook build book

      - name: Build rustdoc
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --all-features --no-deps

      - name: Test doctests
        run: cargo test --doc --workspace

  wasm-build:
    name: WASM Build (ubuntu)
    runs-on: ubuntu-latest
    needs: rust-quality
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM package
        run: wasm-pack build crates/ringgrid-wasm --target web --release

      - name: Verify package output
        run: |
          test -f crates/ringgrid-wasm/pkg/ringgrid_wasm_bg.wasm
          test -f crates/ringgrid-wasm/pkg/ringgrid_wasm.js
          test -f crates/ringgrid-wasm/pkg/ringgrid_wasm.d.ts
          ls -lh crates/ringgrid-wasm/pkg/ringgrid_wasm_bg.wasm

  cross-build:
    name: Cross-platform Build/Test
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace --all-features

      - name: Test
        run: cargo test --workspace --all-features

  capi:
    name: C/C++ ABI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: rust-quality
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/ringgrid-c

      - name: Install cbindgen
        uses: taiki-e/install-action@v2
        with:
          tool: cbindgen

      - name: Verify committed header is up to date
        run: |
          cbindgen --config crates/ringgrid-c/cbindgen.toml \
                   --output "${RUNNER_TEMP}/ringgrid.h" crates/ringgrid-c
          diff -u crates/ringgrid-c/include/ringgrid.h "${RUNNER_TEMP}/ringgrid.h"

      - name: Format & lint
        run: |
          cargo fmt --manifest-path crates/ringgrid-c/Cargo.toml --all --check
          cargo clippy --manifest-path crates/ringgrid-c/Cargo.toml \
                       --all-targets --release -- -D warnings

      - name: Test (unit + marshalling parity)
        run: cargo test --manifest-path crates/ringgrid-c/Cargo.toml --release

      - name: CMake package + find_package consumer (C and C++)
        run: |
          cmake -S crates/ringgrid-c -B "${RUNNER_TEMP}/rgc-build" \
                -DCMAKE_INSTALL_PREFIX="${RUNNER_TEMP}/rgc-prefix" \
                -DCMAKE_INSTALL_LIBDIR=lib -DCMAKE_BUILD_TYPE=Release
          cmake --build "${RUNNER_TEMP}/rgc-build"
          cmake --install "${RUNNER_TEMP}/rgc-build"
          cmake -S crates/ringgrid-c/examples/consumer -B "${RUNNER_TEMP}/rgc-consumer" \
                -Dringgrid_DIR="${RUNNER_TEMP}/rgc-prefix/lib/cmake/ringgrid" \
                -DCMAKE_BUILD_TYPE=Release
          cmake --build "${RUNNER_TEMP}/rgc-consumer"
          "${RUNNER_TEMP}/rgc-consumer/consumer_c"
          "${RUNNER_TEMP}/rgc-consumer/consumer_cpp"

      - name: vcpkg overlay install (local source)
        if: runner.os == 'Linux'
        env:
          RINGGRID_SOURCE_DIR: ${{ github.workspace }}
        run: |
          "${VCPKG_INSTALLATION_ROOT}/vcpkg" install ringgrid \
            --overlay-ports="${GITHUB_WORKSPACE}/crates/ringgrid-c/vcpkg"

  capi-windows:
    name: C/C++ ABI (windows, shared + vcpkg)
    runs-on: windows-latest
    needs: rust-quality
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/ringgrid-c

      - name: Test (unit + marshalling parity)
        run: cargo test --manifest-path crates/ringgrid-c/Cargo.toml --release

      # Build + install the SHARED library and assert the Windows layout the C++
      # package is documented to produce: the DLL is a runtime artifact in bin/,
      # and only the import library belongs in lib/. Regression guard for the fix
      # that stopped duplicating ringgrid_c.dll into lib/.
      - name: CMake shared package + install
        shell: pwsh
        run: |
          cmake -S crates/ringgrid-c -B "$env:RUNNER_TEMP/rgc-build" `
                -DRINGGRID_BUILD_SHARED=ON `
                -DCMAKE_INSTALL_PREFIX="$env:RUNNER_TEMP/rgc-prefix" `
                -DCMAKE_INSTALL_LIBDIR=lib -DCMAKE_INSTALL_BINDIR=bin
          if ($LASTEXITCODE -ne 0) { throw "cmake configure failed" }
          cmake --build "$env:RUNNER_TEMP/rgc-build" --config Release
          if ($LASTEXITCODE -ne 0) { throw "cmake build failed" }
          cmake --install "$env:RUNNER_TEMP/rgc-build" --config Release
          if ($LASTEXITCODE -ne 0) { throw "cmake install failed" }

      - name: Assert Windows shared install layout
        shell: pwsh
        run: |
          $prefix = "$env:RUNNER_TEMP/rgc-prefix"
          Write-Host "--- installed tree ---"
          Get-ChildItem -Recurse -File $prefix | ForEach-Object { $_.FullName }
          if (-not (Test-Path "$prefix/bin/ringgrid_c.dll"))     { throw "FAIL: ringgrid_c.dll missing from bin/" }
          if (-not (Test-Path "$prefix/lib/ringgrid_c.dll.lib")) { throw "FAIL: import library missing from lib/" }
          if (Test-Path "$prefix/lib/ringgrid_c.dll")            { throw "FAIL: DLL must not be duplicated in lib/" }
          Write-Host "OK: DLL only in bin/, import library only in lib/"

      # find_package must resolve the SHARED imported target (IMPORTED_LOCATION
      # -> bin/dll, IMPORTED_IMPLIB -> lib/dll.lib) and both consumers must run
      # with the DLL discovered at runtime from bin/.
      - name: Build + run find_package consumer (shared)
        shell: pwsh
        run: |
          $prefix = "$env:RUNNER_TEMP/rgc-prefix"
          cmake -S crates/ringgrid-c/examples/consumer -B "$env:RUNNER_TEMP/rgc-consumer" `
                -Dringgrid_DIR="$prefix/lib/cmake/ringgrid"
          if ($LASTEXITCODE -ne 0) { throw "consumer configure failed" }
          cmake --build "$env:RUNNER_TEMP/rgc-consumer" --config Release
          if ($LASTEXITCODE -ne 0) { throw "consumer build failed" }
          $env:PATH = "$prefix/bin;$env:PATH"
          & "$env:RUNNER_TEMP/rgc-consumer/Release/consumer_c.exe"
          if ($LASTEXITCODE -ne 0) { throw "consumer_c failed" }
          & "$env:RUNNER_TEMP/rgc-consumer/Release/consumer_cpp.exe"
          if ($LASTEXITCODE -ne 0) { throw "consumer_cpp failed" }

      # End-to-end vcpkg overlay install with the dynamic Windows triplet,
      # building from the local checkout (no published tag / SHA512 needed).
      - name: vcpkg overlay install (x64-windows, local source)
        shell: pwsh
        env:
          RINGGRID_SOURCE_DIR: ${{ github.workspace }}
          # vcpkg sanitizes the port build env; preserve the rustup vars so the
          # cargo proxy resolves the toolchain (cargo itself is located by the
          # portfile's find_program fallback).
          VCPKG_KEEP_ENV_VARS: "CARGO_HOME;RUSTUP_HOME"
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT/vcpkg.exe" install ringgrid:x64-windows `
            --overlay-ports="$env:GITHUB_WORKSPACE/crates/ringgrid-c/vcpkg"
          if ($LASTEXITCODE -ne 0) { throw "vcpkg install failed" }
