name: Publish Rust crates (crates.io)

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # Needed for OIDC -> crates.io token exchange
    permissions:
      id-token: write
      contents: read

    # Optional but recommended: match this in crates.io Trusted Publisher config
    environment: crates-io

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify versions match tag (vX.Y.Z)
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import tomllib

          root = pathlib.Path(".")
          tag = os.environ["GITHUB_REF_NAME"]
          tag_version = tag[1:] if tag.startswith("v") else tag

          def resolve_version(crate_toml: pathlib.Path) -> str:
              data = tomllib.loads(crate_toml.read_text())
              v = data["package"]["version"]
              if isinstance(v, str):
                  return v
              # version.workspace = true → read from workspace root
              ws = tomllib.loads((root / "Cargo.toml").read_text())
              return ws["workspace"]["package"]["version"]

          package_version = resolve_version(root / "crates/ringgrid/Cargo.toml")
          # ringgrid-c is unpublished but is the 5th version-sync location; guard
          # it here so its version can never drift from the published crate/tag.
          capi_version = resolve_version(root / "crates/ringgrid-c/Cargo.toml")

          print(f"tag version:      {tag_version}")
          print(f"crate version:    {package_version}")
          print(f"ringgrid-c crate: {capi_version}")

          if package_version != tag_version:
              raise SystemExit("version mismatch between tag and crates/ringgrid/Cargo.toml")
          if capi_version != tag_version:
              raise SystemExit("version mismatch between tag and crates/ringgrid-c/Cargo.toml")
          PY

      - name: Guard first release (manual publish required once)
        shell: bash
        run: |
          set -euo pipefail
          # Avoid crates.io API access-policy issues by probing the sparse index
          # entry directly. For crate "ringgrid", index path is ri/ng/ringgrid.
          INDEX_URL="https://index.crates.io/ri/ng/ringgrid"
          STATUS="$(
            curl -sS -L \
              -A "ringgrid-ci/${GITHUB_RUN_ID} (+https://github.com/${GITHUB_REPOSITORY})" \
              -o /tmp/ringgrid-index.json \
              -w '%{http_code}' \
              "${INDEX_URL}"
          )"

          if [ "$STATUS" = "404" ]; then
            echo "::error title=First release requires manual publish::Crate 'ringgrid' does not exist on crates.io yet. Trusted Publishing cannot perform the first publish. Run 'cargo publish -p ringgrid --locked' locally with a scoped token, then use this workflow for subsequent tags."
            exit 1
          fi

          if [ "$STATUS" != "200" ]; then
            echo "::warning title=crates.io index check skipped::Could not verify crate existence from index (HTTP $STATUS). Continuing to publish; cargo will perform final validation."
            cat /tmp/ringgrid-index.json || true
          fi

      - name: Test workspace
        run: cargo test --workspace --all-features

      - name: Authenticate to crates.io via Trusted Publishing (OIDC)
        id: cratesio
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish ringgrid
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.cratesio.outputs.token }}
        shell: bash
        run: |
          set -uo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Idempotency: this workflow tolerates a version that was already
          # published (e.g. a manual `cargo publish` before tagging). The
          # sparse index fetched by the guard step lists one JSON object per
          # published version, each carrying a "vers" field.
          if [ -f /tmp/ringgrid-index.json ] && grep -q "\"vers\":\"${VERSION}\"" /tmp/ringgrid-index.json; then
            echo "::notice title=Already published::ringgrid ${VERSION} is already on crates.io; skipping publish."
            exit 0
          fi
          # Fallback for the index-lag race: crates.io may already have the
          # version while the sparse index has not caught up yet.
          set +e
          OUT="$(cargo publish -p ringgrid --locked 2>&1)"
          STATUS=$?
          echo "$OUT"
          if [ $STATUS -ne 0 ] && echo "$OUT" | grep -qiE 'already (exists|uploaded)'; then
            echo "::notice title=Already published::crates.io reports ringgrid ${VERSION} already exists; treating as success."
            exit 0
          fi
          exit $STATUS
