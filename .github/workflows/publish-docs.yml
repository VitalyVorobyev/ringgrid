name: Publish Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install mdbook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      # book/build.sh runs `wasm-pack build`, stages the demo assets (HTML/JS/CSS
      # + samples + freshly built pkg/) into book/src/demo/, then `mdbook build`
      # so /demo/ ships self-contained. Must run after both tool installs.
      - name: Build book (WASM demo + mdBook)
        run: bash book/build.sh

      - name: Build rustdoc
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --all-features --no-deps

      - name: Assemble site
        run: |
          mkdir -p target/site/api
          # Landing page + performance dashboard (committed static source).
          cp -r .github/pages/index.html .github/pages/img .github/pages/performance target/site/
          # User guide (mdBook) at /book.
          cp -r book/book target/site/book
          # API reference (rustdoc) at /api, with a redirect to the facade crate.
          cp -r target/doc/. target/site/api/
          cat > target/site/api/index.html <<'EOF'
          <!doctype html><meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=ringgrid/index.html">
          <link rel="canonical" href="ringgrid/index.html">
          <a href="ringgrid/index.html">ringgrid API reference</a>
          EOF
          # Standalone WASM demo at /demo (mdBook bundled it from book/src/demo).
          cp -r book/book/demo target/site/demo
          # Disable Jekyll so rustdoc _-prefixed files and demo assets are served verbatim.
          touch target/site/.nojekyll

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: target/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs
    timeout-minutes: 10
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
