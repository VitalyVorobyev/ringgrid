# cbindgen configuration for the ringgrid C ABI.
# Generate the header with:  cbindgen --config cbindgen.toml --output include/ringgrid.h
language = "C"
header = "/* Generated by cbindgen from crates/ringgrid-c. Do not edit by hand. */"
include_guard = "RINGGRID_H"
tab_width = 4
style = "type"
cpp_compat = true          # wrap in extern "C" so C++ can include the C header
documentation = true
documentation_style = "doxy"

[export]
prefix = "ringgrid_"

[parse]
parse_deps = false
