# cbindgen configuration for the ringgrid C ABI.
#
# The header is committed at include/ringgrid.h and regenerated with:
#   cbindgen --config cbindgen.toml --output include/ringgrid.h .
# CI regenerates it to a temp file and fails on any diff, so the header can
# never silently drift from src/.
language = "C"
header = "/* Generated by cbindgen from crates/ringgrid-c. Do not edit by hand. */"
include_guard = "RINGGRID_H"
tab_width = 4
style = "type"
cpp_compat = true          # wrap in extern "C" so C++ can include the C header
documentation = true
documentation_style = "doxy"
sys_includes = ["stdint.h", "stddef.h", "stdbool.h"]
no_includes = true

[export]
include = ["RinggridStatus", "RinggridDetector"]

[enum]
# RinggridStatus::Ok -> RINGGRID_STATUS_OK, ::ErrNullArg -> RINGGRID_STATUS_ERR_NULL_ARG
rename_variants = "QualifiedScreamingSnakeCase"
prefix_with_name = false

[parse]
parse_deps = false
