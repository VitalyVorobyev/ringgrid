<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ringgrid WASM Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: #1a1a2e; color: #e0e0e0; padding: 1rem; }
  h1 { font-size: 1.4rem; margin-bottom: 0.5rem; color: #a0c4ff; }
  .version { font-size: 0.85rem; color: #888; margin-bottom: 1rem; }

  .controls { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
  .controls label { font-size: 0.85rem; color: #aaa; }
  button { padding: 0.4rem 0.8rem; border: 1px solid #444; border-radius: 4px;
           background: #2a2a4a; color: #e0e0e0; cursor: pointer; font-size: 0.85rem; }
  button:hover { background: #3a3a6a; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary { background: #3a6ea5; border-color: #5a8ec5; }
  button.primary:hover { background: #4a7eb5; }
  select, input[type="file"], input[type="number"] {
    padding: 0.3rem; border: 1px solid #444; border-radius: 4px;
    background: #2a2a4a; color: #e0e0e0; font-size: 0.85rem; }
  input[type="number"] { width: 5rem; }
  input[type="checkbox"] { accent-color: #5a8ec5; }

  .canvases { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem; }
  .canvas-wrap { position: relative; }
  .canvas-wrap h3 { font-size: 0.85rem; color: #888; margin-bottom: 0.3rem; }
  canvas { border: 1px solid #333; border-radius: 4px; max-width: 100%; height: auto; }

  .status { font-size: 0.85rem; padding: 0.4rem 0.6rem; border-radius: 4px;
            background: #2a2a4a; margin-bottom: 1rem; min-height: 1.5rem; }
  .status.ok { color: #6ecf6e; }
  .status.err { color: #f06060; }

  details { margin-bottom: 1rem; }
  summary { cursor: pointer; font-size: 0.9rem; color: #a0c4ff; padding: 0.3rem 0; }
  .json-panel { max-height: 400px; overflow: auto; background: #111; border: 1px solid #333;
                border-radius: 4px; padding: 0.5rem; margin-top: 0.3rem; }
  .json-panel pre { font-size: 0.75rem; white-space: pre-wrap; word-break: break-all; }

  details.board-cfg { margin-bottom: 0.5rem; }
  details.config-cfg { margin-bottom: 1rem; }
  textarea { width: 100%; max-width: 700px; font-family: monospace; font-size: 0.75rem;
             background: #111; color: #ccc; border: 1px solid #333; border-radius: 4px; padding: 0.4rem; }
  textarea.board-ta { height: 80px; }
  textarea.config-ta { height: 200px; }

  .mode-extra { display: inline-flex; gap: 0.5rem; align-items: center; }
  .mode-extra.hidden { display: none; }

  .quick-controls { display: flex; flex-wrap: wrap; gap: 0.8rem; align-items: center;
                    margin: 0.5rem 0; font-size: 0.85rem; }
  .quick-controls label { color: #aaa; }
  .quick-controls .group { display: flex; gap: 0.3rem; align-items: center; }
  .config-buttons { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
</style>
</head>
<body>

<h1>ringgrid WASM Demo</h1>
<div class="version" id="ver"></div>

<div class="controls">
  <input type="file" id="fileInput" accept="image/*">
  <button id="loadTestBtn">Load Test Image</button>
  <label for="mode">Mode:</label>
  <select id="mode">
    <option value="detect">detect</option>
    <option value="detect_adaptive">detect_adaptive</option>
    <option value="detect_adaptive_hint">detect_adaptive (with hint)</option>
    <option value="detect_multiscale">detect_multiscale</option>
    <option value="propose">propose_with_heatmap</option>
  </select>
  <span class="mode-extra hidden" id="hintExtra">
    <label for="hintDiam">diameter:</label>
    <input type="number" id="hintDiam" value="30" min="4" step="1">
  </span>
  <span class="mode-extra hidden" id="tiersExtra">
    <label for="tiersPreset">tiers:</label>
    <select id="tiersPreset">
      <option value="two_tier">Two-tier (14-100 px)</option>
      <option value="four_tier">Four-tier (8-220 px)</option>
    </select>
  </span>
  <button id="runBtn" class="primary" disabled>Run Detection</button>
</div>

<div class="controls">
  <label><input type="checkbox" id="showEdges"> Show edge points</label>
</div>

<details class="board-cfg">
  <summary>Board JSON</summary>
  <textarea class="board-ta" id="boardJson"></textarea>
</details>

<details class="config-cfg">
  <summary>Detection Config</summary>
  <div class="quick-controls">
    <div class="group">
      <label>Scale min:</label>
      <input type="number" id="scaleMin" value="14" min="4" step="1">
    </div>
    <div class="group">
      <label>max:</label>
      <input type="number" id="scaleMax" value="66" min="4" step="1">
    </div>
    <div class="group">
      <label>Completion:</label>
      <input type="checkbox" id="completionEnable" checked>
    </div>
    <div class="group">
      <label>Refinement:</label>
      <select id="circleRefine">
        <option value="ProjectiveCenter">ProjectiveCenter</option>
        <option value="None">None</option>
      </select>
    </div>
    <div class="group">
      <label>Downscale:</label>
      <select id="proposalDownscale">
        <option value="off">Off</option>
        <option value="auto">Auto</option>
      </select>
    </div>
  </div>
  <textarea class="config-ta" id="configJson"></textarea>
  <div class="config-buttons">
    <button id="applyConfigBtn">Apply Config</button>
    <button id="resetConfigBtn">Reset to Defaults</button>
  </div>
</details>

<div class="status" id="status">Load an image to begin.</div>

<div class="canvases">
  <div class="canvas-wrap">
    <h3>Detection Result</h3>
    <canvas id="mainCanvas" width="1" height="1"></canvas>
  </div>
  <div class="canvas-wrap" id="heatmapWrap" style="display:none">
    <h3>Proposal Heatmap</h3>
    <canvas id="heatCanvas" width="1" height="1"></canvas>
  </div>
</div>

<details id="jsonDetails" style="display:none">
  <summary id="jsonSummary">JSON Result</summary>
  <div class="json-panel"><pre id="jsonPre"></pre></div>
</details>

<script type="module">
// Resolve the base path to the ringgrid-wasm crate root.
// Works whether the page is served from demo/, crates/ringgrid-wasm/, or repo root.
const scriptUrl = new URL(import.meta.url);
const demoDir = scriptUrl.pathname.replace(/\/[^/]*$/, '/');  // directory of this HTML
const crateRoot = demoDir.replace(/demo\/$/, '');             // crates/ringgrid-wasm/
const repoRoot = crateRoot.replace(/crates\/ringgrid-wasm\//, '');

import init, {
  RinggridDetector, default_board_json, default_config_json, version, init_panic_hook,
  scale_tiers_two_tier_standard_json, scale_tiers_four_tier_wide_json
} from '../pkg/ringgrid_wasm.js';

// ── State ───────────────────────────────────────────────────────
let wasmReady = false;
let imageData = null;   // { rgba: Uint8Array, width, height, imgElement }
let detector = null;    // persistent RinggridDetector instance
let configDirty = true; // re-create detector when config changes

const $ = id => document.getElementById(id);

// ── Init ────────────────────────────────────────────────────────
async function bootstrap() {
  try {
    await init();
    init_panic_hook();
    wasmReady = true;
    $('ver').textContent = 'ringgrid v' + version() + ' (WASM)';
    const boardJson = default_board_json();
    $('boardJson').value = boardJson;
    loadDefaultConfig(boardJson);
    setStatus('WASM loaded. Load an image to begin.', 'ok');
  } catch (e) {
    setStatus('Failed to initialize WASM: ' + e, 'err');
  }
}

function loadDefaultConfig(boardJson) {
  try {
    const configStr = default_config_json(boardJson);
    const config = JSON.parse(configStr);
    $('configJson').value = JSON.stringify(config, null, 2);
    // Sync quick controls from config
    $('scaleMin').value = config.marker_scale.diameter_min_px;
    $('scaleMax').value = config.marker_scale.diameter_max_px;
    $('completionEnable').checked = config.completion.enable;
    $('circleRefine').value = config.circle_refinement;
    $('proposalDownscale').value = config.proposal_downscale.toLowerCase();
    configDirty = true;
  } catch (e) {
    setStatus('Failed to load default config: ' + e, 'err');
  }
}

function setStatus(msg, cls) {
  const el = $('status');
  el.textContent = msg;
  el.className = 'status' + (cls ? ' ' + cls : '');
}

// ── Detector lifecycle ─────────────────────────────────────────
function ensureDetector() {
  if (detector && !configDirty) return;
  if (detector) { detector.free(); detector = null; }
  const boardJson = $('boardJson').value;
  const configStr = $('configJson').value;
  detector = RinggridDetector.with_config(boardJson, configStr);
  configDirty = false;
}

// ── Image loading ───────────────────────────────────────────────
function imageToRGBA(img) {
  const c = document.createElement('canvas');
  c.width = img.naturalWidth || img.width;
  c.height = img.naturalHeight || img.height;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0);
  return ctx.getImageData(0, 0, c.width, c.height);
}

function setImage(img) {
  const id = imageToRGBA(img);
  imageData = { rgba: id.data, width: id.width, height: id.height, imgElement: img };
  $('runBtn').disabled = false;

  // Draw original on main canvas
  const mc = $('mainCanvas');
  mc.width = id.width;
  mc.height = id.height;
  mc.getContext('2d').drawImage(img, 0, 0);
  setStatus(`Image loaded: ${id.width} x ${id.height}`, 'ok');
}

$('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => setImage(img);
  img.onerror = () => setStatus('Failed to load image', 'err');
  img.src = URL.createObjectURL(file);
});

$('loadTestBtn').addEventListener('click', async () => {
  setStatus('Loading test image...', '');
  try {
    const resp = await fetch(repoRoot + 'testdata/target_3_split_00.png');
    if (!resp.ok) throw new Error(resp.statusText);
    const blob = await resp.blob();
    const img = new Image();
    img.onload = () => { setImage(img); URL.revokeObjectURL(img.src); };
    img.onerror = () => setStatus('Failed to decode test image', 'err');
    img.src = URL.createObjectURL(blob);
  } catch (e) {
    setStatus('Could not fetch test image: ' + e.message, 'err');
  }
});

// ── Mode selector ──────────────────────────────────────────────
$('mode').addEventListener('change', () => {
  const mode = $('mode').value;
  $('hintExtra').classList.toggle('hidden', mode !== 'detect_adaptive_hint');
  $('tiersExtra').classList.toggle('hidden', mode !== 'detect_multiscale');
});

// ── Config controls ────────────────────────────────────────────
function quickControlsToOverlay() {
  return {
    marker_scale: {
      diameter_min_px: parseFloat($('scaleMin').value),
      diameter_max_px: parseFloat($('scaleMax').value)
    },
    completion: { enable: $('completionEnable').checked },
    circle_refinement: $('circleRefine').value,
    proposal_downscale: $('proposalDownscale').value
  };
}

// When quick controls change, update the full config JSON
for (const id of ['scaleMin', 'scaleMax', 'completionEnable', 'circleRefine', 'proposalDownscale']) {
  $(id).addEventListener('change', () => {
    try {
      const boardJson = $('boardJson').value;
      // Start from defaults, apply overlay
      const base = JSON.parse(default_config_json(boardJson));
      const overlay = quickControlsToOverlay();
      Object.assign(base.marker_scale, overlay.marker_scale);
      base.completion.enable = overlay.completion.enable;
      base.circle_refinement = overlay.circle_refinement;
      base.proposal_downscale = overlay.proposal_downscale;
      $('configJson').value = JSON.stringify(base, null, 2);
      configDirty = true;
    } catch (e) {
      setStatus('Config error: ' + e, 'err');
    }
  });
}

$('applyConfigBtn').addEventListener('click', () => {
  try {
    // Validate JSON parses
    JSON.parse($('configJson').value);
    configDirty = true;
    setStatus('Config applied. Run detection to see changes.', 'ok');
  } catch (e) {
    setStatus('Invalid config JSON: ' + e.message, 'err');
  }
});

$('resetConfigBtn').addEventListener('click', () => {
  loadDefaultConfig($('boardJson').value);
  setStatus('Config reset to defaults.', 'ok');
});

$('boardJson').addEventListener('change', () => {
  loadDefaultConfig($('boardJson').value);
});

// ── Detection ───────────────────────────────────────────────────
$('runBtn').addEventListener('click', runDetection);

async function runDetection() {
  if (!wasmReady || !imageData) return;
  const mode = $('mode').value;
  $('runBtn').disabled = true;
  setStatus('Running ' + mode + '...', '');

  // Yield to let the UI update
  await new Promise(r => setTimeout(r, 10));

  try {
    ensureDetector();

    const t0 = performance.now();
    let jsonStr;

    if (mode === 'detect') {
      jsonStr = detector.detect_rgba(imageData.rgba, imageData.width, imageData.height);
    } else if (mode === 'detect_adaptive') {
      jsonStr = detector.detect_adaptive_rgba(imageData.rgba, imageData.width, imageData.height);
    } else if (mode === 'detect_adaptive_hint') {
      const diam = parseFloat($('hintDiam').value);
      jsonStr = detector.detect_adaptive_with_hint_rgba(imageData.rgba, imageData.width, imageData.height, diam);
    } else if (mode === 'detect_multiscale') {
      const preset = $('tiersPreset').value;
      const tiersJson = preset === 'four_tier'
        ? scale_tiers_four_tier_wide_json()
        : scale_tiers_two_tier_standard_json();
      jsonStr = detector.detect_multiscale_rgba(imageData.rgba, imageData.width, imageData.height, tiersJson);
    } else {
      jsonStr = detector.propose_with_heatmap_rgba(imageData.rgba, imageData.width, imageData.height);
    }

    const elapsed = (performance.now() - t0).toFixed(1);
    const result = JSON.parse(jsonStr);

    // Show heatmap if in propose mode
    if (mode === 'propose') {
      drawHeatmap(detector);
      $('heatmapWrap').style.display = '';
    } else {
      $('heatmapWrap').style.display = 'none';
    }

    // Draw overlay
    const nMarkers = mode === 'propose'
      ? result.proposals.length
      : result.detected_markers.length;

    if (mode !== 'propose') {
      drawOverlay(result);
    } else {
      drawProposalOverlay(result);
    }

    // Status
    const label = mode === 'propose' ? 'proposals' : 'markers';
    setStatus(`${mode}: ${nMarkers} ${label} in ${elapsed} ms`, 'ok');

    // JSON panel
    $('jsonDetails').style.display = '';
    $('jsonSummary').textContent = `JSON Result (${nMarkers} ${label})`;
    $('jsonPre').textContent = JSON.stringify(result, null, 2);

  } catch (e) {
    setStatus('Error: ' + e, 'err');
  } finally {
    $('runBtn').disabled = false;
  }
}

// ── Drawing ─────────────────────────────────────────────────────
function drawOverlay(result) {
  const mc = $('mainCanvas');
  const ctx = mc.getContext('2d');
  const showEdges = $('showEdges').checked;

  // Redraw original image
  mc.width = imageData.width;
  mc.height = imageData.height;
  ctx.drawImage(imageData.imgElement, 0, 0);

  for (const m of result.detected_markers) {
    const color = markerColor(m.confidence);

    // Draw outer ellipse
    if (m.ellipse_outer) {
      const e = m.ellipse_outer;
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(e.cx, e.cy, e.a, e.b, e.angle, 0, 2 * Math.PI);
      ctx.stroke();
      ctx.restore();
    }

    // Draw inner ellipse
    if (m.ellipse_inner) {
      const e = m.ellipse_inner;
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.ellipse(e.cx, e.cy, e.a, e.b, e.angle, 0, 2 * Math.PI);
      ctx.stroke();
      ctx.restore();
    }

    // Draw edge points
    if (showEdges) {
      if (m.edge_points_outer) {
        ctx.fillStyle = color;
        for (const pt of m.edge_points_outer) {
          ctx.beginPath();
          ctx.arc(pt[0], pt[1], 1.5, 0, 2 * Math.PI);
          ctx.fill();
        }
      }
      if (m.edge_points_inner) {
        ctx.fillStyle = color + '99'; // semi-transparent
        for (const pt of m.edge_points_inner) {
          ctx.beginPath();
          ctx.arc(pt[0], pt[1], 1.5, 0, 2 * Math.PI);
          ctx.fill();
        }
      }
    }

    // Draw center
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(m.center[0], m.center[1], 2, 0, 2 * Math.PI);
    ctx.fill();

    // Draw ID label
    if (m.id != null) {
      ctx.font = '10px monospace';
      ctx.fillStyle = color;
      ctx.fillText(String(m.id), m.center[0] + 4, m.center[1] - 4);
    }
  }
}

function drawProposalOverlay(result) {
  const mc = $('mainCanvas');
  const ctx = mc.getContext('2d');
  mc.width = imageData.width;
  mc.height = imageData.height;
  ctx.drawImage(imageData.imgElement, 0, 0);

  for (const p of result.proposals) {
    ctx.strokeStyle = '#00ff80';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 5, 0, 2 * Math.PI);
    ctx.stroke();

    ctx.fillStyle = '#00ff80';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.5, 0, 2 * Math.PI);
    ctx.fill();
  }
}

function drawHeatmap(det) {
  const hc = $('heatCanvas');
  const w = det.heatmap_width();
  const h = det.heatmap_height();
  const data = det.heatmap_f32();

  hc.width = w;
  hc.height = h;
  const ctx = hc.getContext('2d');
  const img = ctx.createImageData(w, h);

  // Find max for normalization
  let maxVal = 0;
  for (let i = 0; i < data.length; i++) {
    if (data[i] > maxVal) maxVal = data[i];
  }

  // Blue-to-red colormap
  for (let i = 0; i < data.length; i++) {
    const t = maxVal > 0 ? data[i] / maxVal : 0;
    img.data[4 * i]     = Math.floor(255 * t);       // R
    img.data[4 * i + 1] = Math.floor(255 * t * (1 - t) * 4); // G (peak at 0.5)
    img.data[4 * i + 2] = Math.floor(255 * (1 - t));  // B
    img.data[4 * i + 3] = 255;
  }

  ctx.putImageData(img, 0, 0);
}

function markerColor(confidence) {
  if (confidence > 0.7) return '#4ade80';  // green
  if (confidence > 0.4) return '#facc15';  // yellow
  return '#f87171';                         // red
}

// ── Boot ────────────────────────────────────────────────────────
bootstrap();
</script>
</body>
</html>
