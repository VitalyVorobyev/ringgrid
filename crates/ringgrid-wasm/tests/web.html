<!DOCTYPE html>
<html>
<head><title>ringgrid WASM test</title></head>
<body>
<h3>ringgrid WASM smoke test</h3>
<canvas id="canvas" width="200" height="200"></canvas>
<pre id="log"></pre>
<script type="module">
import init, { RinggridDetector, default_board_json, version } from '../pkg/ringgrid_wasm.js';

function log(msg) {
    document.getElementById('log').textContent += msg + '\n';
    console.log(msg);
}

async function run() {
    await init();
    log('WASM initialized, version: ' + version());

    const boardJson = default_board_json();
    log('Board loaded: ' + boardJson.substring(0, 60) + '...');

    const detector = new RinggridDetector(boardJson);
    log('Detector created');

    // Generate a test pattern (checkerboard)
    const W = 128, H = 128;
    const pixels = new Uint8Array(W * H * 4);
    for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
            const i = (y * W + x) * 4;
            const v = ((x >> 4) ^ (y >> 4)) & 1 ? 255 : 0;
            pixels[i] = pixels[i+1] = pixels[i+2] = v;
            pixels[i+3] = 255;
        }
    }

    // Test detection
    const result = JSON.parse(detector.detect_rgba(pixels, W, H));
    log(`Detection: ${result.detected_markers.length} markers found`);

    // Test heatmap
    detector.propose_with_heatmap_rgba(pixels, W, H);
    const heatmap = detector.heatmap_f32();
    log(`Heatmap: ${detector.heatmap_width()}x${detector.heatmap_height()}, ${heatmap.length} values`);

    // Draw heatmap on canvas
    const canvas = document.getElementById('canvas');
    const rW = detector.heatmap_width();
    const rH = detector.heatmap_height();
    canvas.width = rW;
    canvas.height = rH;
    const ctx = canvas.getContext('2d');
    const img = ctx.createImageData(rW, rH);
    const maxVal = Math.max(...heatmap);
    for (let i = 0; i < heatmap.length; i++) {
        const v = maxVal > 0 ? Math.floor(255 * heatmap[i] / maxVal) : 0;
        img.data[4*i]     = v;
        img.data[4*i + 1] = 0;
        img.data[4*i + 2] = 255 - v;
        img.data[4*i + 3] = 255;
    }
    ctx.putImageData(img, 0, 0);
    log('Heatmap drawn');

    detector.free();
    log('Done');
}

run().catch(e => log('ERROR: ' + e));
</script>
</body>
</html>
